name: Criteria Keeper

on:
  schedule:
    - cron: "0 9 * * 1" # Every Monday 09:00 UTC
  workflow_dispatch:
    inputs:
      force_pr:
        description: "Open PR even when no changes detected"
        type: boolean
        default: false
      dry_run:
        description: "Print diff without opening PR"
        type: boolean
        default: false

permissions:
  contents: write
  pull-requests: write

jobs:
  update-criteria:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install dependencies
        working-directory: scripts
        run: bun install

      - name: Run Criteria Keeper
        working-directory: scripts
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          FORCE_PR: ${{ inputs.force_pr || 'false' }}
          DRY_RUN: ${{ inputs.dry_run || 'false' }}
        run: bun run criteria-keeper.ts

      - name: Upload run log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: criteria-keeper-log-${{ github.run_id }}
          path: scripts/criteria-keeper.log
          if-no-files-found: ignore
          retention-days: 30
