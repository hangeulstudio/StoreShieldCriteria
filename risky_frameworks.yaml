# StoreShield — Risky Frameworks & Required Manifest SDKs Policy
#
# OFFICIAL APPLE SOURCES:
# - Third-Party SDK Requirements: https://developer.apple.com/support/third-party-SDK-requirements/
# - App Store Review Guidelines 5.1.2: https://developer.apple.com/app-store/review/guidelines/#tracking
# - Privacy Manifest Requirements: https://developer.apple.com/documentation/bundleresources/privacy_manifest_files
#
# Last verified: June 2026

# ────────────────────────────────────────────────────────────────────────────
# RISKY FRAMEWORKS
# Analytics & tracking SDKs known to use IDFA or cross-app tracking APIs.
# These are flagged when NSPrivacyTracking/NSPrivacyTrackingDomains are absent.
# This is a curated list — Apple does not publish an official tracking SDK list.
# ────────────────────────────────────────────────────────────────────────────
risky_frameworks:
  # Analytics & Attribution
  - AppsFlyer
  - FirebaseAnalytics
  - GoogleAnalytics
  - GoogleAnalyticsForFirebase
  - Adjust
  - Branch
  - Mixpanel
  - Amplitude
  - Segment
  - Braze
  - CleverTap
  # Push & Engagement
  - OneSignal
  - UrbanAirship
  - Localytics
  - Flurry
  # Error Reporting (may collect device IDs)
  - Crashlytics
  - Fabric
  # Advertising Networks
  - GoogleMobileAds
  - AdMob
  - FBAudienceNetwork
  - AppLovin
  - ALAdView
  - InMobiSDK
  - IMSdk
  - IronSource
  - ISBannerDelegate
  - MoPub
  - MPAdView
  - OathSDK
  # Facebook SDK
  - FBSDKCoreKit

# ────────────────────────────────────────────────────────────────────────────
# REQUIRED MANIFEST SDKs
# Apple's OFFICIAL list of third-party SDKs that MUST include PrivacyInfo.xcprivacy.
# Source: https://developer.apple.com/support/third-party-SDK-requirements/
# Matching is prefix-based and case-insensitive in ManifestChecker.
# Last synced with Apple's list: June 2026. Entries are SDK name/prefix checks;
# Apple's "BoringSSL / openssl_grpc" bullet is represented as two matchable names.
# ────────────────────────────────────────────────────────────────────────────
